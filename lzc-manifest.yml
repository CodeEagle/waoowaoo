lzc-sdk-version: '0.1'
package: com.waoowaoo.ai.studio
version: 0.0.0-20260306-a909abf
min_os_version: 1.3.8
name: waoowaoo
description: AI-powered short drama / comic video production platform
license: MIT
homepage: https://github.com/waoowaooAI/waoowaoo
author: waoowaoo-team
application:
  subdomain: waoowaoo
  public_path:
    - /
  upstreams:
    - location: /
      backend: http://waoowaoo:3000/
services:
  # MySQL 数据库
  mysql:
    image: registry.lazycat.cloud/invokerlaw/library/mysql:dce173d8b2ebda34
    environment:
      - MYSQL_ROOT_PASSWORD=waoowaoo123
      - MYSQL_DATABASE=waoowaoo
      - MYSQL_ROOT_HOST=%
    binds:
      - /lzcapp/var/db/mysql:/var/lib/mysql
    command: "--default-authentication-plugin=mysql_native_password --sql_mode=STRICT_TRANS_TABLES,NO_ENGINE_SUBSTITUTION"

  # Redis 缓存/队列
  redis:
    image: registry.lazycat.cloud/invokerlaw/library/redis:160a706bce934011
    environment: []
    binds:
      - /lzcapp/var/db/redis:/data
    command: "redis-server --appendonly yes"

  # Next.js 应用
  waoowaoo:
    image: registry.lazycat.cloud/invokerlaw/codeeagle/waoowaoo:448850ae481cecf2
    environment:
      # 数据库配置
      - DATABASE_URL=mysql://root:waoowaoo123@mysql:3306/waoowaoo
      # Redis 配置
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_USERNAME=
      - REDIS_PASSWORD=
      - REDIS_TLS=
      # 存储配置
      - STORAGE_TYPE=local
      # 认证配置 - 使用懒猫域名
      - NEXTAUTH_URL=https://${LAZYCAT_APP_DOMAIN}
      - NEXTAUTH_SECRET=waoowaoo-default-secret-2026
      # 内部密钥
      - CRON_SECRET=waoowaoo-docker-cron-secret
      - INTERNAL_TASK_TOKEN=waoowaoo-docker-task-token
      - API_ENCRYPTION_KEY=waoowaoo-opensource-fixed-key-2026
      # Worker 配置
      - WATCHDOG_INTERVAL_MS=30000
      - TASK_HEARTBEAT_TIMEOUT_MS=90000
      - QUEUE_CONCURRENCY_IMAGE=50
      - QUEUE_CONCURRENCY_VIDEO=50
      - QUEUE_CONCURRENCY_VOICE=20
      - QUEUE_CONCURRENCY_TEXT=50
      # Bull Board
      - BULL_BOARD_HOST=0.0.0.0
      - BULL_BOARD_PORT=3010
      - BULL_BOARD_BASE_PATH=/admin/queues
      - BULL_BOARD_USER=
      - BULL_BOARD_PASSWORD=
      # 日志配置
      - LOG_UNIFIED_ENABLED=true
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - LOG_DEBUG_ENABLED=false
      - LOG_AUDIT_ENABLED=true
      - LOG_SERVICE=waoowaoo
      - LOG_REDACT_KEYS=password,token,apiKey,apikey,authorization,cookie,secret,access_token,refresh_token
      # 计费模式
      - BILLING_MODE=OFF
      # 流式配置
      - LLM_STREAM_EPHEMERAL_ENABLED=true
    binds:
      - /lzcapp/var/data:/app/data
      - /lzcapp/var/logs:/app/logs
    depends_on:
      - mysql
      - redis
    setup_script: |
      mkdir -p /app/data/uploads
      mkdir -p /app/logs
      chown -R node:node /app/data /app/logs

locales:
  en:
    name: waoowaoo
    description: AI-powered short drama / comic video production platform
  zh:
    name: waoowaoo
    description: AI 影视 Studio - 短剧/漫画视频制作工具
